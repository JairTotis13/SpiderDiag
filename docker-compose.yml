services:
  db:
    image: postgres:16-alpine
    container_name: spiderdiag-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: spiderdiag
      POSTGRES_PASSWORD: spiderdiag
      POSTGRES_DB: spiderdiag
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spiderdiag -d spiderdiag"]
      timeout: 10s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: spiderdiag-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - USE_LOCAL_DB=true
      - LOCAL_DB_HOST=db
      - LOCAL_DB_PORT=5432
      - LOCAL_DB_USER=spiderdiag
      - LOCAL_DB_PASSWORD=spiderdiag
      - LOCAL_DB_NAME=spiderdiag
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=${ALGORITHM}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}
      - CORS_ORIGINS=${CORS_ORIGINS}
    ports:
      - "${BACKEND_PORT}:8000"
    devices:
      - "/dev/ttyUSB0:/dev/ttyUSB0"
    volumes:
      - ./backend:/app
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_WS_URL: ${VITE_WS_URL}
    container_name: spiderdiag-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT}:80"

  nginx:
    image: nginx:alpine
    container_name: spiderdiag-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  pg_data:
